name: Deploy Backend to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-south1
  SERVICE: backend-service
  REPO: my-repo

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker asia-south1-docker.pkg.dev

      - name: Build Image
        run: |
          docker build -t asia-south1-docker.pkg.dev/$PROJECT_ID/$REPO/backend-service:latest ./backend

      - name: Push Image
        run: |
          docker push asia-south1-docker.pkg.dev/$PROJECT_ID/$REPO/backend-service:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE \
            --image asia-south1-docker.pkg.dev/$PROJECT_ID/$REPO/backend-service:latest \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --update-secrets OPENAI_API_KEY=openai-api-key:latest
