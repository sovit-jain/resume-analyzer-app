name: Deploy Frontend to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'   # Trigger only when frontend changes

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-south1
  SERVICE: frontend-service
  REPO: my-repo

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Authenticate to GCP
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up gcloud
      uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker
      run: gcloud auth configure-docker asia-south1-docker.pkg.dev

    - name: Build Frontend Image
      run: |
        docker build -t asia-south1-docker.pkg.dev/$PROJECT_ID/$REPO/frontend-service:latest ./frontend

    - name: Push Image
      run: |
        docker push asia-south1-docker.pkg.dev/$PROJECT_ID/$REPO/frontend-service

    - name: Deploy to Cloud Run
      run: |
        gcloud run deploy $SERVICE \
          --image asia-south1-docker.pkg.dev/$PROJECT_ID/$REPO/frontend-service \
          --region $REGION \
          --platform managed \
          --allow-unauthenticated \
          --set-env-vars BACKEND_URL=https://backend-service-812074477410.asia-south1.run.app/analyze-resume
